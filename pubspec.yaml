name: bloom
description: A cute plant journal app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  image_picker: ^1.1.2
  http: ^1.2.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  path_provider: ^2.1.4
  uuid: ^4.5.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
